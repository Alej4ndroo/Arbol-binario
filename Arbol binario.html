<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árbol Binario · Evaluador de Expresiones</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:        #0a0d14;
    --surface:   #111520;
    --border:    #1e2535;
    --accent:    #00e5a0;
    --accent2:   #7c5cfc;
    --danger:    #ff4d6d;
    --warn:      #ffb830;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --node-fill: #151c2e;
    --node-stroke: #00e5a0;
    --node-del:  #ff4d6d;
    --node-expr: #7c5cfc;
    --line:      #1e2535;
    --r: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── grid noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity: .18;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── header ── */
  header {
    display: flex; align-items: flex-end; gap: 1.2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.2rem;
    margin-bottom: 2rem;
  }
  .logo-mark {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.3rem, 3vw, 2rem);
    line-height: 1;
  }
  h1 span { color: var(--accent); }
  .subtitle { font-size: .7rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }

  /* ── cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1.4rem 1.6rem;
    margin-bottom: 1.2rem;
  }
  .card-label {
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .6rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .card-label::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── inputs ── */
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media(max-width:600px){ .input-row { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: .4rem; }
  label { font-size: .65rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

  input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: .88rem;
    padding: .6rem .9rem;
    outline: none;
    transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .hint { font-size: .65rem; color: var(--muted); }

  /* ── buttons ── */
  .btn-row { display: flex; gap: .8rem; flex-wrap: wrap; margin-top: 1rem; }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .06em;
    padding: .55rem 1.3rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: opacity .15s, transform .12s;
    text-transform: uppercase;
  }
  .btn:active { transform: scale(.96); }
  .btn:hover { opacity: .85; }

  .btn-primary { background: var(--accent); color: #000; }
  .btn-danger  { background: var(--danger); color: #fff; }
  .btn-ghost   {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── canvas area ── */
  .canvas-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1rem;
    margin-bottom: 1.2rem;
    overflow-x: auto;
  }
  .canvas-title {
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: .8rem;
  }
  .canvas-title span { color: var(--accent2); }

  svg.tree-svg {
    display: block;
    min-height: 80px;
    width: 100%;
  }

  /* ── delete section ── */
  .delete-row { display: flex; gap: .8rem; align-items: flex-end; flex-wrap: wrap; }
  .delete-row .field { flex: 1; min-width: 160px; }

  /* ── messages ── */
  .msg {
    font-size: .75rem;
    padding: .5rem .8rem;
    border-radius: 4px;
    margin-top: .6rem;
  }
  .msg.error  { background: #2a0d15; border: 1px solid var(--danger); color: var(--danger); }
  .msg.info   { background: #0d1a12; border: 1px solid var(--accent); color: var(--accent); }
  .msg.hidden { display: none; }

  /* ── node styles (SVG) ── */
  .node-circle {
    fill: var(--node-fill);
    stroke-width: 2;
    transition: fill .2s;
  }
  .node-text {
    fill: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    dominant-baseline: middle;
    text-anchor: middle;
    pointer-events: none;
  }
  .edge { stroke: var(--border); stroke-width: 1.5; fill: none; }
  .edge-expr { stroke: var(--accent2); stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }

  /* tooltip */
  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: .4rem .7rem;
    font-size: .72rem;
    pointer-events: none;
    z-index: 100;
    display: none;
  }

  /* legend */
  .legend {
    display: flex; gap: 1.2rem; flex-wrap: wrap;
    font-size: .65rem; color: var(--muted);
    margin-top: .5rem;
  }
  .legend-item { display: flex; align-items: center; gap: .4rem; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-mark">🌲</div>
    <div>
      <h1>Árbol <span>Binario</span></h1>
      <p class="subtitle">Evaluador de expresiones · Programación funcional</p>
    </div>
  </header>

  <!-- Inputs -->
  <div class="card">
    <div class="card-label">Datos de entrada</div>
    <div class="input-row">
      <div class="field">
        <label>Conjunto de números</label>
        <input type="text" id="numInput" placeholder="2, 4, 6, 8, 10" value="5, 3, 8, 1, 4, 7, 10">
        <span class="hint">Separados por coma. Se insertarán como BST.</span>
      </div>
      <div class="field">
        <label>Expresión matemática (opcional)</label>
        <input type="text" id="exprInput" placeholder="x*2 + 1, (x+3)*2 …">
        <span class="hint">Usa <b>x</b> como variable. Soporta + − * / y paréntesis.</span>
      </div>
    </div>
    <div id="inputMsg" class="msg hidden"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="dibujar()">▶ Dibujar árbol</button>
      <button class="btn btn-ghost" onclick="limpiar()">⟳ Limpiar</button>
    </div>
  </div>

  <!-- Canvas árbol principal -->
  <div class="canvas-section">
    <div class="canvas-title">Árbol binario de búsqueda <span id="treeMode"></span></div>
    <svg id="mainSvg" class="tree-svg" height="60">
      <text x="50%" y="50%" fill="#334155" font-family="JetBrains Mono,monospace" font-size="13"
            text-anchor="middle" dominant-baseline="middle">
        Ingresa números y presiona Dibujar
      </text>
    </svg>
    <div class="legend">
      <div class="legend-item"><div class="leg-dot" style="border-color:var(--node-stroke)"></div> Nodo normal</div>
      <div class="legend-item"><div class="leg-dot" style="border-color:var(--node-expr)"></div> Valor con expresión</div>
      <div class="legend-item"><div class="leg-dot" style="border-color:var(--danger)"></div> Nodo eliminado</div>
    </div>
  </div>

  <!-- Eliminación de nodo -->
  <div class="card">
    <div class="card-label">Eliminar nodo</div>
    <div class="delete-row">
      <div class="field">
        <label>Valor a eliminar</label>
        <input type="text" id="delInput" placeholder="Ej: 4">
      </div>
      <button class="btn btn-danger" onclick="eliminarNodo()">✕ Eliminar y re-dibujar</button>
    </div>
    <div id="delMsg" class="msg hidden"></div>
  </div>

  <!-- Canvas árbol tras eliminación -->
  <div class="canvas-section" id="delSection" style="display:none">
    <div class="canvas-title">Árbol después de eliminar <span id="delLabel" style="color:var(--danger)"></span></div>
    <svg id="delSvg" class="tree-svg" height="60"></svg>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
/* ═══════════════════════════════════════════
   PROGRAMACIÓN FUNCIONAL + RECURSIVIDAD
   ─ Árbol Binario de Búsqueda (BST)
   ─ Evaluador de expresiones
   ═══════════════════════════════════════════ */

// ── Tipos inmutables (objetos planos) ──────────────────────────────────────
const makeNode = (val, left = null, right = null) => ({ val, left, right });

// ── BST puro: insert recursivo ─────────────────────────────────────────────
const insert = (node, val) =>
  node === null
    ? makeNode(val)
    : val < node.val
      ? makeNode(node.val, insert(node.left, val), node.right)
      : val > node.val
        ? makeNode(node.val, node.left, insert(node.right, val))
        : node; // duplicado: ignorar

// Construir BST desde array (fold funcional)
const buildBST = nums =>
  nums.reduce((tree, n) => insert(tree, n), null);

// ── Recorridos recursivos ──────────────────────────────────────────────────
const inorder  = node => node === null ? [] : [...inorder(node.left),  node.val, ...inorder(node.right)];
const preorder = node => node === null ? [] : [node.val, ...preorder(node.left), ...preorder(node.right)];

// ── Eliminación BST (recursiva) ────────────────────────────────────────────
const minVal = node => node.left === null ? node.val : minVal(node.left);

const deleteNode = (node, val) => {
  if (node === null) return null;
  if (val < node.val) return makeNode(node.val, deleteNode(node.left, val), node.right);
  if (val > node.val) return makeNode(node.val, node.left, deleteNode(node.right, val));
  // nodo encontrado
  if (node.left === null) return node.right;
  if (node.right === null) return node.left;
  // dos hijos: sucesor inorden
  const succ = minVal(node.right);
  return makeNode(succ, node.left, deleteNode(node.right, succ));
};

// ── Evaluador de expresiones ───────────────────────────────────────────────
// Tokenizer
const tokenize = expr => {
  const tokens = [];
  let i = 0, s = expr.replace(/\s/g, '');
  while (i < s.length) {
    if (/\d/.test(s[i]) || (s[i] === '.' && /\d/.test(s[i+1]))) {
      let num = '';
      while (i < s.length && /[\d.]/.test(s[i])) num += s[i++];
      tokens.push({ type: 'NUM', val: parseFloat(num) });
    } else if (s[i] === 'x') {
      tokens.push({ type: 'VAR' }); i++;
    } else if ('+-*/'.includes(s[i])) {
      tokens.push({ type: 'OP', val: s[i] }); i++;
    } else if (s[i] === '(') {
      tokens.push({ type: 'LP' }); i++;
    } else if (s[i] === ')') {
      tokens.push({ type: 'RP' }); i++;
    } else {
      throw new Error(`Token inválido: ${s[i]}`);
    }
  }
  return tokens;
};

// Recursive-descent parser (devuelve función pura x => resultado)
const parse = tokens => {
  let pos = 0;
  const peek  = () => tokens[pos];
  const consume = () => tokens[pos++];

  const parseExpr = () => {
    let left = parseTerm();
    while (peek() && peek().type === 'OP' && '+-'.includes(peek().val)) {
      const op = consume().val;
      const right = parseTerm();
      const l = left, r = right, o = op; // closure captura
      left = x => o === '+' ? l(x) + r(x) : l(x) - r(x);
    }
    return left;
  };

  const parseTerm = () => {
    let left = parseFactor();
    while (peek() && peek().type === 'OP' && '*/'.includes(peek().val)) {
      const op = consume().val;
      const right = parseFactor();
      const l = left, r = right, o = op;
      left = x => o === '*' ? l(x) * r(x) : l(x) / r(x);
    }
    return left;
  };

  const parseFactor = () => {
    const t = peek();
    if (!t) throw new Error('Expresión incompleta');
    if (t.type === 'NUM')  { consume(); return () => t.val; }
    if (t.type === 'VAR')  { consume(); return x => x; }
    if (t.type === 'LP') {
      consume();
      const inner = parseExpr();
      if (!peek() || peek().type !== 'RP') throw new Error('Falta paréntesis de cierre');
      consume();
      return inner;
    }
    // unario negativo
    if (t.type === 'OP' && t.val === '-') {
      consume();
      const f = parseFactor();
      return x => -f(x);
    }
    throw new Error(`Token inesperado: ${JSON.stringify(t)}`);
  };

  const fn = parseExpr();
  if (pos !== tokens.length) throw new Error('Expresión con tokens extra');
  return fn;
};

const evalExpr = (exprStr, x) => {
  const tokens = tokenize(exprStr);
  const fn = parse(tokens);
  return fn(x);
};

// ── Aplicar expresión: transforma el BST construyendo uno nuevo ────────────
// Estrategia: evaluar cada valor original con la expresión y re-insertar
const applyExpr = (originalNums, exprStr) =>
  buildBST(originalNums.map(n => evalExpr(exprStr, n)));

// ── Layout recursivo del árbol (x,y por nodo) ─────────────────────────────
const R = 22; // radio nodo
const H = 70; // separación vertical

const computeLayout = (node, depth = 0, counter = { val: 0 }) => {
  if (node === null) return null;
  const left  = computeLayout(node.left,  depth + 1, counter);
  const x     = counter.val++ * (R * 2 + 14);
  const right = computeLayout(node.right, depth + 1, counter);
  return { ...node, x, y: depth * H + R + 10, left, right };
};

// ── Render SVG recursivo ───────────────────────────────────────────────────
const svgNS = 'http://www.w3.org/2000/svg';

const renderEdges = (node, svg, useExpr) => {
  if (!node) return;
  const edgeLine = (x1, y1, x2, y2) => {
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('class', useExpr ? 'edge-expr' : 'edge');
    svg.insertBefore(line, svg.firstChild);
  };
  if (node.left)  { edgeLine(node.x, node.y, node.left.x,  node.left.y);  renderEdges(node.left,  svg, useExpr); }
  if (node.right) { edgeLine(node.x, node.y, node.right.x, node.right.y); renderEdges(node.right, svg, useExpr); }
};

const renderNodes = (node, svg, useExpr, tooltip, originalVals = null) => {
  if (!node) return;

  // círculo
  const circle = document.createElementNS(svgNS, 'circle');
  circle.setAttribute('cx', node.x);
  circle.setAttribute('cy', node.y);
  circle.setAttribute('r', R);
  circle.setAttribute('class', 'node-circle');
  circle.style.stroke = useExpr ? 'var(--node-expr)' : 'var(--node-stroke)';
  svg.appendChild(circle);

  // label
  const text = document.createElementNS(svgNS, 'text');
  text.setAttribute('x', node.x);
  text.setAttribute('y', node.y);
  text.setAttribute('class', 'node-text');
  text.textContent = node.val;
  svg.appendChild(text);

  // hover tooltip
  circle.style.cursor = 'pointer';
  circle.addEventListener('mouseenter', e => {
    tooltip.style.display = 'block';
    tooltip.textContent = `Valor: ${node.val}`;
    if (originalVals) {
      const orig = originalVals.find(o => Math.abs(evalExprSafe(o) - node.val) < 1e-9);
      if (orig !== undefined) tooltip.textContent += ` (orig: ${orig})`;
    }
  });
  circle.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 28) + 'px';
  });
  circle.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

  renderNodes(node.left,  svg, useExpr, tooltip, originalVals);
  renderNodes(node.right, svg, useExpr, tooltip, originalVals);
};

let _currentExprFn = null;
const evalExprSafe = x => _currentExprFn ? _currentExprFn(x) : x;

const renderTree = (root, svgEl, useExpr = false, originalVals = null) => {
  svgEl.innerHTML = '';
  if (!root) {
    svgEl.setAttribute('height', 60);
    const t = document.createElementNS(svgNS, 'text');
    t.setAttribute('x', '50%'); t.setAttribute('y', '50%');
    t.setAttribute('fill', '#334155'); t.setAttribute('font-family', 'JetBrains Mono,monospace');
    t.setAttribute('font-size', '13'); t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.textContent = 'Árbol vacío';
    svgEl.appendChild(t);
    return;
  }
  const laid = computeLayout(root);
  // calcular bbox
  const allX = [], allY = [];
  const collect = n => { if (!n) return; allX.push(n.x); allY.push(n.y); collect(n.left); collect(n.right); };
  collect(laid);
  const minX = Math.min(...allX) - R - 10;
  const maxX = Math.max(...allX) + R + 10;
  const maxY = Math.max(...allY) + R + 15;
  const W = maxX - minX;

  svgEl.setAttribute('viewBox', `${minX} 0 ${W} ${maxY}`);
  svgEl.setAttribute('height', maxY);
  svgEl.style.minWidth = W + 'px';

  const tooltip = document.getElementById('tooltip');
  renderEdges(laid, svgEl, useExpr);
  renderNodes(laid, svgEl, useExpr, tooltip, originalVals);
};

// ── Estado global (mutable mínimo) ────────────────────────────────────────
let state = {
  nums:    [],
  tree:    null,
  exprStr: '',
  useExpr: false,
};

// ── Helpers UI ─────────────────────────────────────────────────────────────
const showMsg = (id, text, type) => {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type}`;
};
const hideMsg = id => { document.getElementById(id).className = 'msg hidden'; };

// ── Parsear números del input ──────────────────────────────────────────────
const parseNums = str =>
  str.split(',')
     .map(s => s.trim())
     .filter(s => s.length > 0)
     .map(s => {
       const n = Number(s);
       if (isNaN(n)) throw new Error(`"${s}" no es un número válido`);
       return n;
     });

// ── Acción: Dibujar ────────────────────────────────────────────────────────
function dibujar() {
  hideMsg('inputMsg');
  document.getElementById('delSection').style.display = 'none';

  let nums;
  try {
    nums = parseNums(document.getElementById('numInput').value);
    if (nums.length === 0) throw new Error('Ingresa al menos un número');
  } catch(e) {
    showMsg('inputMsg', '⚠ ' + e.message, 'error'); return;
  }

  const exprStr = document.getElementById('exprInput').value.trim();
  let useExpr = false, finalNums = nums;

  if (exprStr) {
    try {
      const tokens = tokenize(exprStr);
      _currentExprFn = parse(tokens);
      finalNums = nums.map(n => {
        const r = _currentExprFn(n);
        if (!isFinite(r)) throw new Error(`Resultado no finito para x=${n}`);
        return Math.round(r * 1000) / 1000; // redondear a 3 decimales
      });
      useExpr = true;
      document.getElementById('treeMode').textContent = `· expresión: ${exprStr}`;
    } catch(e) {
      showMsg('inputMsg', '⚠ Error en expresión: ' + e.message, 'error'); return;
    }
  } else {
    _currentExprFn = null;
    document.getElementById('treeMode').textContent = '';
  }

  const tree = buildBST(finalNums);
  state = { nums: finalNums, originalNums: nums, tree, exprStr, useExpr };

  renderTree(tree, document.getElementById('mainSvg'), useExpr, useExpr ? nums : null);

  showMsg('inputMsg',
    `✓ Árbol construido · ${finalNums.length} nodos · Inorden: [${inorder(tree).join(', ')}]`,
    'info');
}

// ── Acción: Eliminar nodo ──────────────────────────────────────────────────
function eliminarNodo() {
  hideMsg('delMsg');
  if (!state.tree) { showMsg('delMsg', '⚠ Dibuja un árbol primero', 'error'); return; }

  const raw = document.getElementById('delInput').value.trim();
  const val = Number(raw);
  if (!raw || isNaN(val)) { showMsg('delMsg', '⚠ Ingresa un número válido', 'error'); return; }

  const newTree = deleteNode(state.tree, val);
  if (inorder(newTree).length === inorder(state.tree).length) {
    showMsg('delMsg', `⚠ El valor ${val} no existe en el árbol`, 'error'); return;
  }

  state = { ...state, tree: newTree };

  document.getElementById('delSection').style.display = 'block';
  document.getElementById('delLabel').textContent = `nodo ${val}`;
  renderTree(newTree, document.getElementById('delSvg'), state.useExpr);

  showMsg('delMsg',
    `✓ Nodo ${val} eliminado · Inorden: [${inorder(newTree).join(', ')}]`,
    'info');
}

// ── Limpiar ────────────────────────────────────────────────────────────────
function limpiar() {
  state = { nums: [], tree: null, exprStr: '', useExpr: false };
  _currentExprFn = null;
  document.getElementById('numInput').value = '';
  document.getElementById('exprInput').value = '';
  document.getElementById('delInput').value = '';
  document.getElementById('treeMode').textContent = '';
  document.getElementById('delSection').style.display = 'none';
  hideMsg('inputMsg'); hideMsg('delMsg');
  const svg = document.getElementById('mainSvg');
  svg.innerHTML = '';
  svg.setAttribute('height', 60);
  const t = document.createElementNS(svgNS, 'text');
  t.setAttribute('x', '50%'); t.setAttribute('y', '50%');
  t.setAttribute('fill', '#334155'); t.setAttribute('font-family', 'JetBrains Mono,monospace');
  t.setAttribute('font-size', '13'); t.setAttribute('text-anchor', 'middle');
  t.setAttribute('dominant-baseline', 'middle');
  t.textContent = 'Ingresa números y presiona Dibujar';
  svg.appendChild(t);
}

// Enter key atajo
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') dibujar();
});
